<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastroMED.css">
    <title>CADASTRO MÉDICO</title>
</head>
<body>
     <div class="tela">

        <h1>CADASTRO PROFISSIONAL</h1>

        <form action="cadastroMED.php" method="POST">

            <label>CPF</label>
            <input type="tel"
                id="cpf"
                name ="cpf"
                maxlength="14"
                placeholder ="000.000.000-00"
                autocomplete="off"
                required
            >

            <label>Nome</label>
            <input type="text"
                id="nome"
                name="nome"
                required
            >

            <label>Endereço</label>
            <input type="text"
                id="endereco"
                name="endereco"
                required
            >

            <label>Telefone</label>
            <input type="tel" id="telefone" name="telefone" maxlength="15" placeholder="(00) 00000-0000" autocomplete="off" required>

            <label>E-mail</label>
            <input type="email" id="email" name="email" required>

            <label>Profissão</label>
            <input type="text" id="profissao" name="profissao" required>

            <label>Senha</label>
            <input type="password" id="senha" name="senha" required>

            <input type="password" id="confirmar-senha" name="confirmar-senha" required>

            <button type="button" onclick="window.location.href='login.html'">
                CADASTRAR MÉDICO
            </button>

        </form>

    </div> <script src="cadastroMED.js"></script>

    
</body>
</html>
