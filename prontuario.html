<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prontuário</title>
  <link rel="stylesheet" href="prontuario.css">
</head>
<body>

  <main class="prontuario-container">

    <form class="prontuario-form">

      <section class="dados-topo">
        
        <div class="coluna-esquerda">
          <div class="campo-linha">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
          </div>

          <div class="campo-linha">
            <label for="data-nascimento">Data nascimento:</label>
            <input type="text" id="data-nascimento" name="data_nascimento">
          </div>

          <div class="campo-linha">
            <label for="idade">Idade:</label>
            <input type="text" id="idade" name="idade">
          </div>

          <div class="campo-linha">
            <label for="sexo">Sexo:</label>
            <input type="text" id="sexo" name="sexo">
          </div>

          <div class="campo-linha">
            <label for="cpf-paciente">CPF:</label>
            <input type="text" id="cpf-paciente" name="cpf_paciente">
          </div>
        </div>

        <div class="coluna-direita">
          <div class="campo-linha">
            <label for="responsavel">Responsável:</label>
            <input type="text" id="responsavel" name="responsavel">
          </div>

          <div class="campo-linha">
            <label for="cpf-responsavel">CPF:</label>
            <input type="text" id="cpf-responsavel" name="cpf_responsavel">
          </div>

          <div class="campo-linha">
            <label for="grau-parentesco">Grau de parentesco:</label>
            <input type="text" id="grau-parentesco" name="grau_parentesco">
          </div>
        </div>

      </section>

      <section class="parte-inferior">

        <div class="historico-wrapper">
          <h2>Histórico médico:</h2>

          <div class="historico-box">
            <button type="button" class="btn-editar">EDITAR</button>

            <div class="campo-historico">
              <label for="medicamento">Toma medicamento:</label>
              <textarea id="medicamento" name="medicamento"></textarea>
            </div>

            <div class="campo-historico">
              <label for="cirurgias">Fez cirurgias:</label>
              <textarea id="cirurgias" name="cirurgias"></textarea>
            </div>

            <div class="campo-historico">
              <label for="alergia">Tem alergia:</label>
              <textarea id="alergia" name="alergia"></textarea>
            </div>

            <div class="campo-historico">
              <label for="historico-familiar">Histórico familiar de doença:</label>
              <textarea id="historico-familiar" name="historico_familiar"></textarea>
            </div>
          </div>
        </div>

        <div class="area-botao">
          <button type="submit" class="btn-salvar">SALVAR</button>
        </div>

      </section>

    </form>
  </main>

</body>
</html>
