<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Paciente</title>

    <link rel="stylesheet" href="cadastroPACI.css">
</head>

<body>

<div class="tela">

    <h1>TELA CADASTRO PACIENTE</h1>

    <div class="topo">

        <div class="dados">

            <label>Nome</label>
            <input type="text">

            <label>CPF</label>
            <input type="text">

        </div>

        <div class="score">
            SCORE
        </div>

    </div>

    <div class="sexo">

        <label>
            <input type="radio" name="sexo">
            Masculino
        </label>

        <label>
            <input type="radio" name="sexo">
            Feminino
        </label>

    </div>

    <div class="grid">

        <div class="item">Deficiência intelectual</div>
        <div class="item">Face prolongada/orelha</div>

        <div class="item">Macroorquidismo</div>
        <div class="item">Hipermobilidade articular</div>

        <div class="item">Dificuldade aprendizagem</div>
        <div class="item">Déficit de atenção</div>

        <div class="item">Movimentos repetitivos</div>
        <div class="item">Atraso na fala</div>

        <div class="item">Hiperatividade</div>
        <div class="item">Evita contato visual</div>

        <div class="item">Evita contato físico</div>
        <div class="item">Agressividade</div>

    </div>

</div>

</body>
</html>
